[manifest]
version = "0.1.0"
priority = 0

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = "-- TARGET: add your own CardAreas for joker evaluation"
position = 'before'
match_indent = true
payload = '''
if SuperAutoJokers and SuperAutoJokers.toy_card_area then table.insert(t, SuperAutoJokers.toy_card_area) end
'''

[[patches]]
[patches.pattern]
target = 'globals.lua'
pattern = 'GREY = HEX("5f7377"),'
position = 'after'
match_indent = true
payload = '''
ORCHIDMANTIS_PINK = HEX("FF95EC"),
'''

[[patches]]
[patches.pattern]
target = 'functions/misc_functions.lua'
pattern = 'inactive = G.C.UI.TEXT_INACTIVE,'
position = 'after'
match_indent = true
payload = '''
orchidmantis_pink = G.C.ORCHIDMANTIS_PINK,
'''

[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = 'if v.yes_pool_flag and not G.GAME.pool_flags[v.yes_pool_flag] then add = nil end'
position = 'after'
match_indent = true
payload = '''if SuperAutoJokers.config["disable_vanilla"] == true and v.set == "Joker" and (not v.original_key or (v.class_prefix and v.class_prefix..'_'..v.original_key == v.key)) then add = nil end'''